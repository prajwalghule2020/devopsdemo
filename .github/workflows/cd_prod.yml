name: CD Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 100.30.225.142
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euxo pipefail

            cd /home/ubuntu/devopsdemo

            # Non-interactive shells may miss PATH customizations (nvm, npm, pm2).
            if [ -f "$HOME/.profile" ]; then
              . "$HOME/.profile"
            fi
            if [ -f "$HOME/.bashrc" ]; then
              . "$HOME/.bashrc"
            fi
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              if command -v nvm >/dev/null 2>&1; then
                nvm use --lts >/dev/null 2>&1 || nvm install --lts
              fi
            fi

            git fetch origin main
            git checkout main

            # Avoid pull conflicts from local lockfile drift created during server-side installs.
            if ! git diff --quiet -- pnpm-lock.yaml; then
              git restore -- pnpm-lock.yaml
            fi

            git pull --ff-only origin main

            if command -v pnpm >/dev/null 2>&1; then
              PNPM_CMD="pnpm"
            elif command -v corepack >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.0.0 --activate
              PNPM_CMD="pnpm"
            elif command -v npm >/dev/null 2>&1; then
              PNPM_CMD="npx pnpm@9.0.0"
            else
              echo "pnpm/corepack/npm not found. Install Node.js (18+) on the server."
              exit 1
            fi

            echo "Using package manager command: $PNPM_CMD"
            if ! eval "$PNPM_CMD install --frozen-lockfile"; then
              echo "Frozen lockfile install failed, retrying with --no-frozen-lockfile"
              eval "$PNPM_CMD install --no-frozen-lockfile"
            fi
            eval "$PNPM_CMD build"

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "PM2 is required on the server. Install with: npm i -g pm2"
              exit 1
            fi

            if pm2 describe fe-server >/dev/null 2>&1; then
              pm2 restart fe-server --update-env
            elif pm2 describe web >/dev/null 2>&1; then
              pm2 restart web --update-env
            else
              pm2 start bash --name fe-server -- -lc "$PNPM_CMD --filter web start"
            fi

            if pm2 describe http-server >/dev/null 2>&1; then
              pm2 restart http-server --update-env
            else
              pm2 start bash --name http-server -- -lc "$PNPM_CMD --filter http-server start"
            fi

            if pm2 describe ws-server >/dev/null 2>&1; then
              pm2 restart ws-server --update-env
            else
              pm2 start bash --name ws-server -- -lc "$PNPM_CMD --filter ws-server start"
            fi

            pm2 save
